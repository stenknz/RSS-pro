services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/rss.db
      - LOG_LEVEL=INFO
      - FULLTEXT_RSS_URL=http://fullfeedrss/extract.php
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  fullfeedrss:
    image: heussd/fivefilters-full-text-rss:latest
    mem_limit: 512m
    restart: unless-stopped
    environment:
      - FTR_ADMIN_PASSWORD=
    volumes:
      - ftr-cache:/var/www/html/cache/rss

volumes:
  ftr-cache:
